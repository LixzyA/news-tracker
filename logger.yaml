version: 1
formatters:
  brief:
    format: "%(asctime)s - %(levelname)s - %(message)s"
  detailed:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: brief
    level: INFO
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: detailed
    level: DEBUG
    filename: log/news_tracker.log
    maxBytes: 1048576  # 1MB
    backupCount: 5
# loggers:
#   news_tracker:
#     level: DEBUG
#     handlers: [console, file]
#     propagate: no
#   database:
#     level: DEBUG
#     handlers: [console, file]
#     propagate: no
root:
  level: DEBUG
  handlers: [console, file]
